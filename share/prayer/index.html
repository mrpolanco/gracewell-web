<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Prayer — Gracewell</title>
  <meta name="description" content="A prayer shared from Gracewell." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --bg: #f6f1e8;
      --surface: rgba(255, 255, 255, 0.92);
      --line: rgba(212, 196, 167, 0.78);
      --text: #24314a;
      --muted: #6b7280;
      --accent: #1f3556;
      --shadow: 0 20px 48px rgba(94, 79, 47, 0.11);
      --radius-xl: 28px;
      --content-width: 520px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(212, 177, 98, 0.14), transparent 34%),
                  linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
    }
    .page {
      width: min(calc(100% - 32px), var(--content-width));
      margin: 0 auto;
      padding: 48px 0 64px;
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 32px;
    }
    .eyebrow {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(212, 177, 98, 0.18);
      color: #99762f;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .prayer-label {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .prayer-text {
      font-size: 1.1rem;
      line-height: 1.75;
      margin: 0 0 16px;
      white-space: pre-wrap;
    }
    .prayer-from {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="eyebrow">Gracewell</div>
      <p class="prayer-label">A prayer shared with you</p>
      <p class="prayer-text" id="prayerText">Loading…</p>
      <p class="prayer-from" id="prayerFrom"></p>
    </div>
    <a class="cta" href="https://apps.apple.com/us/app/gracewell/id6760741742">
      Open in Gracewell
    </a>
  </main>
  <script>
    // Populate prayer content from query params: ?from=Sarah&text=Lord+guide+us...
    (function () {
      const params = new URLSearchParams(window.location.search);
      const from = params.get("from");
      const text = params.get("text");
      if (text) document.getElementById("prayerText").textContent = decodeURIComponent(text);
      if (from) document.getElementById("prayerFrom").textContent = `From ${decodeURIComponent(from)}`;
      if (from) document.title = `Prayer from ${decodeURIComponent(from)} — Gracewell`;
    }());
  </script>
</body>
</html>
